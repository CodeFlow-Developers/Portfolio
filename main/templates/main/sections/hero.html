<section class="hero" id="hero">
    <!-- Floating 3D shapes background -->
    <div class="shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <!-- Hero content -->
    <div class="hero-content">
        <h1 class="hero-title">
            <span class="static-text">We are </span>
            <span class="typing-text" id="typing"></span>
        </h1>
        <p class="hero-subtitle">
            We build fast, responsive, and scalable web solutions 
            using Python, Django, and modern frontend technologies.
        </p>
        <div class="hero-buttons">
            <a class="btn btn-primary" href="{% url 'contact' %}">Hire Us</a>
            <a class="btn btn-secondary" href="{% url 'projects' %}">View Work</a>
        </div>
    </div>

    <!-- Scroll down arrow -->
    <div class="scroll-down">
        <span>↓</span>
    </div>
</section>

<!-- Typing animation JS -->
<script>
    const words = ["CodeFlow Developers", "Full-Stack Experts", "Django Specialists", "Your Tech Partners"];
    let wordIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingEl = document.getElementById("typing");

    function type() {
        const currentWord = words[wordIndex];
        if (isDeleting) {
            typingEl.textContent = currentWord.substring(0, charIndex - 1);
            charIndex--;
        } else {
            typingEl.textContent = currentWord.substring(0, charIndex + 1);
            charIndex++;
        }
        if (!isDeleting && charIndex === currentWord.length) {
            setTimeout(() => isDeleting = true, 1500);
        } else if (isDeleting && charIndex === 0) {
            isDeleting = false;
            wordIndex = (wordIndex + 1) % words.length;
        }
        setTimeout(type, isDeleting ? 60 : 100);
    }
    type();
</script>
